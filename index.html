<!DOCTYPE html><html lang="vi"><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cổng thông tin quản lý đào tạo PTIT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <style>
        /* Reset CSS cơ bản */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Vẫn giữ ẩn cuộn trên Desktop cho gọn */
        }

        /* Phần chứa nội dung chính chia làm 2 cột */
        .main-content {
            display: flex;
            flex: 1;
        }

        /* --- CỘT TRÁI: ẢNH NỀN --- */
        .left-side {
            flex: 7;
            position: relative;
        }

        .left-side img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* --- CỘT PHẢI: FORM ĐĂNG NHẬP --- */
        .right-side {
            flex: 3;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 350px;
        }

        .login-container {
            width: 80%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo img {
            max-width: 100%;
            height: auto;
        }

        /* Style cho các ô input */
        .input-group {
            display: flex;
            align-items: stretch;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
        }

        .input-icon {
            background-color: #e9ecef;
            color: #555;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #ccc;
        }

        .input-group input {
            flex: 1;
            padding: 10px 15px;
            border: none;
            outline: none;
            background-color: #f4f7fe;
            font-size: 14px;
        }

        .toggle-password {
            background-color: #f4f7fe;
            color: #555;
            padding: 12px 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password:hover {
            color: #000;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 15px;
        }

        .forgot-password a {
            color: #a3171e;
            text-decoration: none;
            font-size: 14px;
            font-style: italic;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        /* Style cho các nút bấm */
        .btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-red { background-color: #a71e1e; }
        .btn-red:hover { background-color: #8a1319; }

        .btn-blue { background-color: #0078d4; }
        .btn-blue:hover { background-color: #0063af; }

        /* --- PHẦN CHÂN TRANG: CHỮ CHẠY --- */
        .footer {
            background-color: #a71e1e;
            color: white;
            height: 40px;
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            flex-shrink: 0; /* Đảm bảo footer không bị bóp nhỏ trên mobile */
        }

        marquee {
            width: 100%;
        }

        /* =========================================
           RESPONSIVE CSS CHUYÊN DỤNG CHO MOBILE/TABLET 
           ========================================= */
        @media screen and (max-width: 850px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow-y: auto; /* Cho phép cuộn để không bị mất nút khi bàn phím bật lên */
            }

            .main-content {
                flex-direction: column; /* Đổi thành xếp dọc: Ảnh ở trên, Form ở dưới */
            }

            .left-side {
                flex: none;
                height: 200px; /* Giới hạn chiều cao ảnh trên mobile */
                width: 100%;
            }

            .right-side {
                flex: 1;
                min-width: 100%; /* Chiếm trọn chiều ngang */
                padding: 40px 20px; /* Thêm không gian cho dễ nhìn */
            }

            .login-container {
                width: 100%; /* Mở rộng form trên mobile */
            }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="left-side">
            <img src="https://ptit.edu.vn/wp-content/uploads/2025/05/IMG_0044-2048x1347.png"/>
        </div>

        <div class="right-side">
            <div class="login-container">
                <div class="logo">
                    <img src="avatar.jpg"/>
                </div>

                <form action="" method="POST">
                    <div class="input-group">
                        <div class="input-icon"><i class="fas fa-user"></i></div>
                        <input type="text" id="username" name="username" placeholder="Tên đăng nhập" required=""/>
                    </div>

                    <div class="input-group">
                        <div class="input-icon"><i class="fas fa-lock"></i></div>
                        <input type="password" id="password" name="password" placeholder="Mật khẩu" required=""/>
                        <div class="toggle-password" id="toggleBtn">
                            <i class="fas fa-eye-slash" id="toggleIcon"></i>
                        </div>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Quên mật khẩu</a>
                    </div>

                    <button type="submit" class="btn btn-red">
                        <i class="fas fa-sign-in-alt"></i> Đăng nhập
                    </button>
                    
                    <button type="button" class="btn btn-blue">
                        Đăng nhập với Microsoft office 365
                    </button>
                    
                    <button type="button" class="btn btn-red">
                        <i class="fas fa-bell"></i> Xem thông báo - tin tức
                    </button>
                </form>

            </div> 
        </div> 
    </div> 

    <div class="footer">
        <marquee behavior="scroll" direction="right" scrollamount="6">
            HỌC VIỆN CÔNG NGHỆ BƯU CHÍNH VIỄN THÔNG 
        </marquee>
    </div>

    <script>
        // JS chức năng Ẩn/Hiện mật khẩu
        const toggleBtn = document.getElementById('toggleBtn');
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');

        toggleBtn.addEventListener('click', function () {
            // Kiểm tra type của input đang là gì
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Đổi icon tương ứng
            if (type === 'password') {
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        });

        // Đoạn code bạn tham khảo lúc đầu
        function setFavicon(favicon) {
            let link = document.querySelector("link[rel~='icon']");
            if (!link) {
                link = document.createElement('link');
                link.type = 'image/x-icon';
                link.rel = 'shortcut icon';
                document.getElementsByTagName('head')[0]?.appendChild(link);
            }
            link.href = favicon || '';
        }

        function setTitle(title) {
            document.title = title || 'Web';
        }
    </script>


</body></html>
